<!DOCTYPE html><html>
<head>
<title>Login - AI Student Assistant</title><style>
body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
padding-top:120px;
}

input{
width:260px;
padding:10px;
margin:10px;
border-radius:5px;
border:none;
}

button{
padding:10px 25px;
background:#22c55e;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
margin-top:10px;
}
</style></head><body><h1>Login</h1><input id="email" type="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="loginEmail()">Login</button>

<br><br>

<button onclick="loginGoogle()">Login with Google</button>

<br><br>

<input id="phone" type="text" placeholder="+91XXXXXXXXXX"><br>

<div id="recaptcha-container"></div><button onclick="loginPhone()">Login with Mobile OTP</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
GoogleAuthProvider,
signInWithRedirect,
RecaptchaVerifier,
signInWithPhoneNumber
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";


const firebaseConfig = {
apiKey: "AIzaSyCNPecmEOxvJfI_PvG_tUopapr7beaB6DY",
authDomain: "ai-student-assistant-fe776.firebaseapp.com",
projectId: "ai-student-assistant-fe776",
storageBucket: "ai-student-assistant-fe776.appspot.com",
appId: "1:660130862451:web:1b8dfe1e293ee06a542106"
};


const app = initializeApp(firebaseConfig);
const auth = getAuth(app);



window.loginEmail = async function(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

await signInWithEmailAndPassword(auth,email,password);

alert("Login successful");

}



window.loginGoogle = async function(){

const provider = new GoogleAuthProvider();

await signInWithRedirect(auth,provider);

}



window.loginPhone = async function(){

window.recaptchaVerifier =
new RecaptchaVerifier("recaptcha-container",{size:"normal"},auth);

const phoneNumber =
document.getElementById("phone").value;

const confirmation =
await signInWithPhoneNumber(auth,phoneNumber,window.recaptchaVerifier);

const code = prompt("Enter OTP");

await confirmation.confirm(code);

alert("Phone login successful");

}

</script></body>
</html>
