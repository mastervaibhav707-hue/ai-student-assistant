<!DOCTYPE html>
<html>
<head>
<title>Signup - AI Student Assistant</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
padding-top:120px;
}

input{
width:260px;
padding:10px;
margin:10px;
border-radius:5px;
border:none;
}

button{
padding:10px 25px;
background:#3b82f6;
color:white;
border:none;
border-radius:5px;
}

</style>

</head>

<body>

<h1>Create Account</h1>

<input type="email" placeholder="Email"><br>
<input type="password" placeholder="Password"><br>
<input type="password" placeholder="Confirm Password"><br>

<button>Signup</button>
<br><br>

<button onclick="loginGoogle()">Continue with Google</button>

<br><br>

<input id="phone" type="text" placeholder="Mobile number"><br>

<div id="recaptcha-container"></div>
<button onclick="loginPhone()">Continue with Mobile OTP</button>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyCNPEcmeEOxvJfI_PvG_tUopapr7beaB6DY",
authDomain: "ai-student-assistant-fe776.firebaseapp.com",
projectId: "ai-student-assistant-fe776",
storageBucket: "ai-student-assistant-fe776.appspot.com",
appId: "1:660130862451:web:1b8dfe1e293ee06a542106"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.loginGoogle = async function(){
const provider = new GoogleAuthProvider();
await signInWithPopup(auth, provider);
alert("Google signup successful");
}

window.loginPhone = async function(){
window.recaptchaVerifier = new RecaptchaVerifier(auth,"recaptcha-container",{size:"normal"});
const phoneNumber = document.getElementById("phone").value;
const confirmation = await signInWithPhoneNumber(auth,phoneNumber,window.recaptchaVerifier);
const code = prompt("Enter OTP");
await confirmation.confirm(code);
alert("Phone signup successful");
}

</script>  
</body>
</html>
