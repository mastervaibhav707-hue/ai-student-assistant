<!DOCTYPE html>
<html>
<head>
<title>AI Student Assistant</title>
<style>
body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:600px;
margin:auto;
}

textarea{
width:100%;
height:120px;
padding:10px;
border-radius:8px;
border:none;
margin-top:20px;
}

button{
margin-top:15px;
padding:12px 20px;
background:#22c55e;
border:none;
border-radius:8px;
color:white;
font-size:16px;
cursor:pointer;
}

#response{
margin-top:25px;
background:#1e293b;
padding:15px;
border-radius:8px;
}
</style>
</head>

<body>
<div style="position:fixed; top:20px; right:30px; z-index:1000;">

<a href="/login.html" style="
padding:8px 16px;
background:#3b82f6;
color:white;
text-decoration:none;
border-radius:5px;
margin-right:10px;
">Login</a>

<a href="/signup.html" style="
padding:8px 16px;
background:#22c55e;
color:white;
text-decoration:none;
border-radius:5px;
">Signup</a>

</div>
<div class="container">

<h1>AI Student Assistant</h1>
<p>Ask any academic question</p>

<textarea id="question" placeholder="Type your question..."></textarea>

<br>

<button onclick="askAI()">Ask AI</button>

<div id="response"></div>

</div>

<script>

async function askAI(){

let question = document.getElementById("question").value;

document.getElementById("response").innerHTML="Thinking...";

let res = await fetch("/api/ask",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({ question: question })
});

let data = await res.json();

document.getElementById("response").innerHTML=data.answer;

}

</script>

</body>
</html>
